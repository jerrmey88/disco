<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>外掛大腦 9.1</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #0a0a0a; margin: 0; padding: 15px; color: #e0e0e0; padding-bottom: 60px; }
        .container { max-width: 500px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        select { font-size: 1rem; padding: 6px; border-radius: 8px; border: 1px solid #333; background: #1a1a1a; color: white; }
        
        .status-card { background: #111; padding: 25px 20px; border-radius: 24px; box-shadow: 0 15px 35px rgba(0,0,0,0.6); margin-bottom: 25px; text-align: center; border: 1px solid #222; }
        .main-income-title { font-size: 0.85rem; color: #666; margin-bottom: 8px; letter-spacing: 2px; font-weight: bold; }
        .main-income-amount { font-size: 2.8rem; font-weight: 900; color: #00d2ff; margin-bottom: 25px; text-shadow: 0 0 20px rgba(0,210,255,0.3); }
        
        /* 水位條設計 */
        .water-bar-container { width: 100%; height: 50px; background-color: #1a1a1a; border-radius: 25px; overflow: hidden; position: relative; margin-bottom: 15px; border: 2px solid #333; box-shadow: inset 0 2px 10px rgba(0,0,0,0.5); }
        .water-fill { height: 100%; background: linear-gradient(90deg, #00d2ff 0%, #3a7bd5 100%); transition: width 0.6s cubic-bezier(0.23, 1, 0.32, 1); display: flex; align-items: center; padding-left: 20px; color: white; font-weight: bold; font-size: 0.9rem; position: relative; z-index: 2; }
        
        /* 生存線（60% 位置） */
        .survival-marker { position: absolute; left: 60%; top: 0; bottom: 0; width: 3px; background-color: #ff3b30; z-index: 10; box-shadow: 0 0 10px rgba(255,59,48,0.8); }
        .survival-label { position: absolute; top: -25px; left: 60%; transform: translateX(-50%); font-size: 12px; color: #ff3b30; font-weight: 900; letter-spacing: 1px; white-space: nowrap; }

        .info-row { display: flex; justify-content: space-between; font-size: 0.9rem; color: #888; margin-top: 20px; padding: 0 5px; }
        .result-text { font-size: 1.2rem; font-weight: bold; margin-top: 20px; padding: 18px; border-radius: 16px; line-height: 1.6; }
        .success { background: rgba(0, 210, 255, 0.15); color: #00d2ff; border: 1px solid rgba(0, 210, 255, 0.4); }
        .danger { background: rgba(255, 59, 48, 0.15); color: #ff3b30; border: 1px solid rgba(255, 59, 48, 0.4); }

        /* 內容區塊 */
        .section { background: #161616; padding: 20px; border-radius: 20px; margin-bottom: 20px; border: 1px solid #222; }
        .section h3 { margin-top: 0; font-size: 1rem; border-left: 4px solid #00d2ff; padding-left: 12px; margin-bottom: 20px; color: #fff; letter-spacing: 1px; }
