<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>外掛大腦 10.0</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #0f0f0f; margin: 0; padding: 15px; color: #e0e0e0; padding-bottom: 60px; }
        .container { max-width: 500px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        select { font-size: 1rem; padding: 6px 10px; border-radius: 8px; border: 1px solid #333; background: #1a1a1a; color: white; font-weight: bold; }
        
        .status-card { background: #161616; padding: 25px 20px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); margin-bottom: 25px; text-align: center; border: 1px solid #2a2a2a; }
        .main-income-title { font-size: 0.85rem; color: #888; margin-bottom: 8px; letter-spacing: 2px; font-weight: bold; }
        .main-income-amount { font-size: 2.8rem; font-weight: 900; color: #00d2ff; margin-bottom: 25px; text-shadow: 0 0 15px rgba(0,210,255,0.2); }
        
        .water-bar-container { width: 100%; height: 50px; background-color: #111; border-radius: 25px; overflow: hidden; position: relative; margin-bottom: 15px; border: 2px solid #333; }
        .water-fill { height: 100%; background: linear-gradient(90deg, #00d2ff 0%, #3a7bd5 100%); transition: width 0.6s cubic-bezier(0.23, 1, 0.32, 1); display: flex; align-items: center; padding-left: 20px; color: white; font-weight: bold; font-size: 0.9rem; position: relative; z-index: 2; }
        
        .survival-marker { position: absolute; left: 60%; top: 0; bottom: 0; width: 3px; background-color: #ff3b30; z-index: 10; box-shadow: 0 0 8px rgba(255,59,48,0.9); }
        .survival-label { position: absolute; top: -22px; left: 60%; transform: translateX(-50%); font-size: 11px; color: #ff3b30; font-weight: 900; letter-spacing: 1px; white-space: nowrap; }

        .info-row { display: flex; justify-content: space-between; font-size: 0.9rem; color: #888; margin-top: 20px; padding: 0 5px; }
        .result-text { font-size: 1.1rem; font-weight: bold; margin-top: 20px; padding: 18px; border-radius: 16px; line-height: 1.6; }
        .success { background: rgba(0, 210, 255, 0.1); color: #00d2ff; border: 1px solid rgba(0, 210, 255, 0.3); }
        .danger { background: rgba(255, 59, 48, 0.1); color: #ff3b30; border: 1px solid rgba(255, 59, 48, 0.3); }

        .section { background: #161616; padding: 20px; border-radius: 20px; margin-bottom: 20px; border: 1px solid #2a2a2a; }
        .section h3 { margin-top: 0; font-size: 1rem; border-left: 4px solid #00d2ff; padding-left: 12px; margin-bottom: 20px; color: #fff; letter-spacing: 1px; }
        
        .input-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .input-row input { width: 120px; padding: 12px; border: 1px solid #333; border-radius: 12px; text-align: center; font-size: 1.1rem; background: #0f0f0f; color: #00d2ff; font-weight: bold; }

        .expense-form { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .expense-form input { flex: 2; min-width: 120px; padding: 14px; border: 1px solid #333; border-radius: 12px; background: #0f0f0f; color: white; font-size: 1rem; }
        .expense-form select { flex: 1; padding: 14px; border-radius: 12px; background: #0f0f0f; color: white; border: 1px solid #333; font-size: 1rem; }
        .btn-add { width: 100%; padding: 16px; background: #00d2ff; color: #000; border: none; border-radius: 14px; font-size: 1.1rem; font-weight: 800; cursor: pointer; }

        .expense-list { list-style: none; padding: 0; margin: 0; }
        .expense-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid #222; }
        .tag { padding: 4px 10px; border-radius: 8px; font-size: 0.75rem; font-weight: 900; }
        .tag-S { border: 1px solid #00d2ff; color: #00d2ff; }
        .tag-I { border: 1px solid #a855f7; color: #a855f7; }
        .tag-E { border: 1px solid #f97316; color: #f97316; }
        .tag-U { border: 1px solid #888; color: #888; }
        .btn-delete { color: #666; background: none; border: 1px solid #333; border-radius: 8px; padding: 6px 12px; font-size: 0.8rem; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2 style="margin:0; font-size: 1.3rem; letter-spacing: 3px; font-weight: 900; color: #fff;">DISCO BRAIN 10</h2>
        <select id="monthSelector" onchange="loadData()">
            <option value="2026-01">一月</option>
            <option value="2026-02">二月</option>
            <option value="2026-03">三月</option>
            <option value="2026-04" selected>四月</option>
            <option value="2026-05">五月</option>
            <option value="2026-06">六月</option>
            <option value="2026-07">七月</option>
            <option value="2026-08">八月</option>
            <option value="2026-09">九月</option>
            <option value="2026-10">十月</option>
            <option value="2026-11">十一月</option>
            <option value="2026-12">十二月</option>
        </select>
    </div>

    <div class="status-card">
        <div class="main-income-title">CURRENT INCOME</div>
        <div class="main-income-amount" id="topIncome">$0</div>
        
        <div class="water-bar-container">
            <div class="survival-label">── 生存警戒線 ──</div>
            <div class="survival-marker"></div>
            <div id="waterBar" class="water-fill" style="width: 0%;">
                <span id="barText">GOAL: 20,000</span>
            </div>
        </div>

        <div class="info-row">
            <div>生存餘額：<span id="survivalBalance" style="font-weight: 900;">0</span></div>
            <div>投資/娛樂：<span id="extraDiff" style="font-weight: 900;">0</span></div>
        </div>
        
        <div id="statusResult" class="result-text danger">系統喚醒中...</div>
    </div>

    <div class="section">
        <h3>🎯 MONTHLY TARGET</h3>
        <div class="input-row">
            <label>生存門檻 ($)</label>
            <input type="number" id="baseSurvivalGoal" value="20000" onchange="saveData()">
        </div>
    </div>

    <div class="section">
        <h3>💰 INCOME</h3>
        <div class="input-row"><label>教課收入</label><input type="number" id="teaching" value="0" onchange="saveData()"></div>
        <div class="input-row"><label>已排硬體 (2750/場)</label><input type="number" id="gigs" value="0" onchange="saveData()"></div>
        <div class="input-row"><label>打工時數 (225/hr)</label><input type="number" id="ptHours" value="0" onchange="saveData()"></div>
        <div class="input-row"><label>Bass 案子</label><input type="number" id="bassIncome" value="0" onchange="saveData()"></div>
    </div>

    <div class="section">
        <h3>💸 EXPENSES</h3>
        <div class="expense-form">
            <input type="text" id="expName" placeholder="項目內容">
            <input type="number" id="expAmount" placeholder="金額">
            <select id="expCategory">
                <option value="生存">生存</option>
                <option value="投資">投資</option>
                <option value="娛樂">娛樂</option>
            </select>
            <button class="btn-add" onclick="addExpense()">+ 紀錄支出</button>
        </div>
        <ul id="expenseList" class="expense-list"></ul>
    </div>
</div>

<script>
    // 10.0 全新金鑰，徹底切斷與舊版死鎖資料的連結
    function getStorageKey() {
        const selector = document.getElementById('monthSelector');
        return 'disco_brain_v10_' + (selector ? selector.value : '2026-04');
    }

    function safeGet(key) {
        try { return localStorage.getItem(key); }
        catch(e) { return null; }
    }

    function safeSet(key, val) {
        try { localStorage.setItem(key, val); }
        catch(e) { console.error("無法存檔:", e); }
    }

    function normalizeData(rawData) {
        let data = {};
        if (rawData) {
            try { data = JSON.parse(rawData); } catch(e) {}
        }
        return {
            baseGoal: parseInt(data.baseGoal) || 20000,
            teaching: parseInt(data.teaching) || 0,
            gigs: parseInt(data.gigs) || 0,
            ptHours: parseInt(data.ptHours) || 0,
            bassIncome: parseInt(data.bassIncome) || 0,
            expenses: Array.isArray(data.expenses) ? data.expenses : []
        };
    }

    function loadData() {
        let data = normalizeData(safeGet(getStorageKey()));
        document.getElementById('baseSurvivalGoal').value = data.baseGoal;
        document.getElementById('teaching').value = data.teaching;
        document.getElementById('gigs').value = data.gigs;
        document.getElementById('ptHours').value = data.ptHours;
        document.getElementById('bassIncome').value = data.bassIncome;
        renderExpenses(data.expenses);
        calculateState(data);
    }

    function saveData() {
        let data = normalizeData(safeGet(getStorageKey()));
        data.baseGoal = parseInt(document.getElementById('baseSurvivalGoal').value) || 0;
        data.teaching = parseInt(document.getElementById('teaching').value) || 0;
        data.gigs = parseInt(document.getElementById('gigs').value) || 0;
        data.ptHours = parseInt(document.getElementById('ptHours').value) || 0;
        data.bassIncome = parseInt(document.getElementById('bassIncome').value) || 0;
        safeSet(getStorageKey(), JSON.stringify(data));
        calculateState(data);
    }

    function addExpense() {
        const name = document.getElementById('expName').value.trim();
        const amount = parseInt(document.getElementById('expAmount').value);
        const category = document.getElementById('expCategory').value;
        if (!name || isNaN(amount)) return;
        
        let data = normalizeData(safeGet(getStorageKey()));
        data.expenses.push({ id: Date.now(), name, amount, category });
        safeSet(getStorageKey(), JSON.stringify(data));
        
        document.getElementById('expName').value = '';
        document.getElementById('expAmount').value = '';
        renderExpenses(data.expenses);
        calculateState(data);
    }

    function deleteExpense(id) {
        let data = normalizeData(safeGet(getStorageKey()));
        data.expenses = data.expenses.filter(exp => exp.id !== id);
        safeSet(getStorageKey(), JSON.stringify(data));
        renderExpenses(data.expenses);
        calculateState(data);
    }

    function renderExpenses(expenses) {
        const list = document.getElementById('expenseList');
        list.innerHTML = '';
        expenses.forEach(exp => {
            let cat = exp.category || '未';
            let tagClass = cat === '生存' ? 'tag-S' : (cat === '投資' ? 'tag-I' : (cat === '娛樂' ? 'tag-E' : 'tag-U'));
            const li = document.createElement('li'); li.className = 'expense-item';
            li.innerHTML = `<div><span class="tag ${tagClass}">${cat.charAt(0)}</span><span style="margin-left:12px;">${exp.name}</span></div>
                <div><span style="margin-right:12px;">$${exp.amount.toLocaleString()}</span><button class="btn-delete" onclick="deleteExpense(${exp.id})">DEL</button></div>`;
            list.appendChild(li);
        });
    }

    function calculateState(data) {
        const income = data.teaching + (data.gigs * 2750) + (data.ptHours * 225) + data.bassIncome;
        let s_spend = 0, i_spend = 0, e_spend = 0;
        data.expenses.forEach(exp => {
            if (exp.category === '生存') s_spend += exp.amount;
            else if (exp.category === '投資') i_spend += exp.amount;
            else e_spend += exp.amount;
        });

        const extra_spend = i_spend + e_spend;
        const s_bal = data.baseGoal - s_spend;
        const over_s = s_bal < 0 ? Math.abs(s_bal) : 0;

        let dynamicMax = Math.max(data.baseGoal / 0.6, data.baseGoal + extra_spend + over_s);
        if (isNaN(dynamicMax) || dynamicMax <= 0) dynamicMax = 1;

        let visualPerc = (income / dynamicMax) * 100;
        if (isNaN(visualPerc)) visualPerc = 0;
        visualPerc = Math.min(100, Math.max(0, visualPerc));

        document.getElementById('topIncome').innerText = '$' + income.toLocaleString();

        const balEl = document.getElementById('survivalBalance');
        balEl.innerText = s_bal.toLocaleString();
        balEl.style.color = s_bal < 0 ? '#ff3b30' : '#00d2ff';
        document.getElementById('extraDiff').innerText = extra_spend.toLocaleString();

        const bar = document.getElementById('waterBar');
        bar.style.width = visualPerc + '%';

        const barText = document.getElementById('barText');
        const finalTarget = data.baseGoal + extra_spend + over_s;

        if (income < data.baseGoal) {
            barText.innerText = 'GOAL: ' + data.baseGoal.toLocaleString();
        } else if (income < finalTarget) {
            barText.innerText = '補完計畫中...';
        } else {
            barText.innerText = 'SUCCESS!';
        }

        const res = document.getElementById('statusResult');
        if (income >= finalTarget) {
            res.className = 'result-text success';
            res.innerText = '🎉 已跨越生存線！\n剩餘可投資/娛樂資金：+' + (income - (s_spend + extra_spend)).toLocaleString() + ' 元';
        } else {
            res.className = 'result-text danger';
            res.innerText = '🚧 距離活下來還差 ' + (finalTarget - income).toLocaleString() + ' 元';
        }
    }

    // 確保畫面出現後再啟動引擎，避免任何搶拍當機
    document.addEventListener("DOMContentLoaded", function() {
        loadData();
    });
    
    // 雙重保險：如果 DOM 早就載完，直接執行
    if (document.readyState === "complete" || document.readyState === "interactive") {
        setTimeout(loadData, 100);
    }
</script>
</body>
</html>
