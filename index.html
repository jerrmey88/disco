<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>外掛大腦 9.3</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #0f0f0f; margin: 0; padding: 15px; color: #e0e0e0; padding-bottom: 60px; }
        .container { max-width: 500px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        select { font-size: 1rem; padding: 6px; border-radius: 8px; border: 1px solid #333; background: #1a1a1a; color: white; }
        
        .status-card { background: #161616; padding: 25px 20px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); margin-bottom: 25px; text-align: center; border: 1px solid #2a2a2a; }
        .main-income-title { font-size: 0.85rem; color: #888; margin-bottom: 8px; letter-spacing: 2px; font-weight: bold; }
        .main-income-amount { font-size: 2.8rem; font-weight: 900; color: #00d2ff; margin-bottom: 25px; text-shadow: 0 0 15px rgba(0,210,255,0.2); }
        
        .water-bar-container { width: 100%; height: 50px; background-color: #111; border-radius: 25px; overflow: hidden; position: relative; margin-bottom: 15px; border: 2px solid #333; }
        .water-fill { height: 100%; background: linear-gradient(90deg, #00d2ff 0%, #3a7bd5 100%); transition: width 0.6s cubic-bezier(0.23, 1, 0.32, 1); display: flex; align-items: center; padding-left: 20px; color: white; font-weight: bold; font-size: 0.9rem; position: relative; z-index: 2; }
        
        .survival-marker { position: absolute; left: 60%; top: 0; bottom: 0; width: 3px; background-color: #ff3b30; z-index: 10; box-shadow: 0 0 8px rgba(255,59,48,0.9); }
        .survival-label { position: absolute; top: -22px; left: 60%; transform: translateX(-50%); font-size: 11px; color: #ff3b30; font-weight: 900; letter-spacing: 1px; white-space: nowrap; }

        .info-row { display: flex; justify-content: space-between; font-size: 0.9rem; color: #888; margin-top: 20px; padding: 0 5px; }
        .result-text { font-size: 1.1rem; font-weight: bold; margin-top: 20px; padding: 18px; border-radius: 16px; line-height: 1.6; }
        .success { background: rgba(0, 210, 255, 0.1); color: #00d2ff; border: 1px solid rgba(0, 210, 255, 0.3); }
        .danger { background: rgba(255, 59, 48, 0.1); color: #ff3b30; border: 1px solid rgba(255, 59, 48, 0.3); }

        .section { background: #161616; padding: 20px; border-radius: 20px; margin-bottom: 20px; border: 1px solid #2a2a2a; }
        .section h3 { margin-top: 0; font-size: 1rem; border-left: 4px solid #00d2ff; padding-left: 12px; margin-bottom: 20px; color: #fff; letter-spacing: 1px; }
        
        .input-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .input-row input { width: 120px; padding: 12px; border: 1px solid #333; border-radius: 12px; text-align: center; font-size: 1.1rem; background: #0f0f0f; color: #00d2ff; font-weight: bold; }

        .expense-form { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .expense-form input { flex: 2; min-width: 120px; padding: 14px; border: 1px solid #333; border-radius: 12px; background: #0f0f0f; color: white; font-size: 1rem; }
        .expense-form select { flex: 1; padding: 14px; border-radius: 12px; background: #0f0f0f; color: white; border: 1px solid #333; font-size: 1rem; }
        .btn-add { width: 100%; padding: 16px; background: #00d2ff; color: #000; border: none; border-radius: 14px; font-size: 1.1rem; font-weight: 800; cursor: pointer; }

        .expense-list { list-style: none; padding: 0; margin: 0; }
        .expense-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid #222; }
        .tag { padding: 4px 10px; border-radius: 8px; font-size: 0.75rem; font-weight: 900; }
        .tag-S { border: 1px solid #00d2ff; color: #00d2ff; }
        .tag-I { border: 1px solid #a855f7; color: #a855f7; }
        .tag-E { border: 1px solid #f97316; color: #f97316; }
        .tag-U { border: 1px solid #888; color: #888; }
        .btn-delete { color: #666; background: none; border: 1px solid #333; border-radius: 8px; padding: 6px 12px; font-size: 0.8rem; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2 style="margin:0; font-size: 1.3rem; letter-spacing: 3px; font-weight: 900; color: #fff;">DISCO BRAIN 9.3</h2>
        <select id="monthSelector" onchange="loadData()">
            <option value="2026-04">APRIL</option>
            <option value="2026-05">MAY</option>
            <option value="2026-06">JUNE</option>
        </select>
    </div>

    <div class="status-card">
        <div class="main-income-title">CURRENT INCOME</div>
        <div class="main-income-amount" id="topIncome">$0</div>
        
        <div class="water-bar-container">
            <div class="survival-label">── 生存警戒線 ──</div>
            <div class="survival-marker"></div>
            <div id="waterBar" class="water-fill" style="width: 0%;">
                <span id="barText">GOAL: 20,000</span>
            </div>
        </div>

        <div class="info-row">
            <div>生存餘額：<span id="survivalBalance" style="font-weight: 900;">0</span></div>
            <div>投資/娛樂：<span id="extraDiff" style="font-weight: 900;">0</span></div>
        </div>
        
        <div id="statusResult" class="result-text danger">系統載入中...</div>
    </div>

    <div class="section">
        <h3>🎯 MONTHLY TARGET</h3>
        <div class="input-row">
            <label>生存門檻 ($)</label>
            <input type="number" id="baseSurvivalGoal" value="20000" onchange="saveData()">
        </div>
    </div>

    <div class="section">
        <h3>💰 INCOME</h3>
        <div class="input-row"><label>教課收入</label><input type="number" id="teaching" value="0" onchange="saveData()"></div>
        <div class="input-row"><label>已排硬體 (2750/場)</label><input type="number" id="gigs" value="0" onchange="saveData()"></div>
        <div class="input-row"><label>打工時數 (225/hr)</label><input type="number" id="ptHours" value="0" onchange="saveData()"></div>
        <div class="input-row"><label>Bass 案子</label><input type="number" id="bassIncome" value="0" onchange="saveData()"></div>
    </div>

    <div class="section">
        <h3>💸 EXPENSES</h3>
        <div class="expense-form">
            <input type="text" id="expName" placeholder="項目內容">
            <input type="number" id="expAmount" placeholder="金額">
            <select id="expCategory">
                <option value="生存">生存</option>
                <option value="投資">投資</option>
                <option value="娛樂">娛樂</option>
            </select>
            <button class="btn-add" onclick="addExpense()">+ 紀錄支出</button>
        </div>
        <ul id="expenseList" class="expense-list"></ul>
    </div>
</div>

<script>
    // 記憶體備用庫（防止無痕模式阻擋 localStorage）
    const memStore = {};

    function getStorageKey() { 
        return 'brainApp_v9_' + (document.getElementById('monthSelector').value || '2026-04'); 
    }

    function safeGet(key) {
        try { return localStorage.getItem(key); } 
        catch(e) { return memStore[key] || null; }
    }

    function safeSet(key, val) {
        try { localStorage.setItem(key, val); } 
        catch(e) { memStore[key] = val; }
    }

    // 🛡️ 鐵壁資料淨化器（絕對防當機核心）
    function normalizeData(rawData) {
        let data = {};
        try { data = typeof rawData === 'string' ? JSON.parse(rawData) : rawData; } catch(e) {}
        if (!data || typeof data !== 'object') data = {};
        
        return {
            baseGoal: parseInt(data.baseGoal) || 20000,
            teaching: parseInt(data.teaching) || 0,
            gigs: parseInt(data.gigs) || 0,
            ptHours: parseInt(data.ptHours) || 0,
            bassIncome: parseInt(data.bassIncome) || 0,
            expenses: Array.isArray(data.expenses) ? data.expenses : []
        };
    }

    function loadData() {
