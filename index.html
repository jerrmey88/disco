<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>外掛大腦 7.0</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #121212; margin: 0; padding: 15px; color: #e0e0e0; padding-bottom: 50px; }
        .container { max-width: 500px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        select { font-size: 1.1rem; padding: 5px; border-radius: 8px; border: 1px solid #333; background: #1e1e1e; color: white; font-weight: bold; }
        
        .status-card { background: #1e1e1e; padding: 20px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); margin-bottom: 20px; text-align: center; border: 1px solid #333; }
        .water-bar-container { width: 100%; height: 35px; background-color: #333; border-radius: 18px; overflow: hidden; position: relative; margin: 15px 0; }
        .water-fill { height: 100%; background: linear-gradient(90deg, #00d2ff 0%, #3a7bd5 100%); transition: width 0.4s ease; display: flex; align-items: center; padding-left: 15px; color: white; font-weight: bold; font-size: 0.9rem; white-space: nowrap; }
        .target-text { font-size: 1.1rem; font-weight: bold; color: #bbb; margin-bottom: 5px; }
        .result-text { font-size: 1.25rem; font-weight: bold; margin-top: 10px; padding: 15px; border-radius: 12px; line-height: 1.4; border: 1px solid rgba(255,255,255,0.1); }
        .success { background: rgba(46, 125, 50, 0.2); color: #81c784; }
        .danger { background: rgba(198, 40, 40, 0.2); color: #e57373; }
        .survival-tracking { font-size: 0.95rem; color: #aaa; margin-top: 8px; padding: 8px; background: rgba(255,255,255,0.05); border-radius: 8px; }

        .section { background: #1e1e1e; padding: 15px; border-radius: 16px; margin-bottom: 20px; border: 1px solid #333; }
        .section h3 { margin-top: 0; font-size: 1.1rem; border-bottom: 1px solid #333; padding-bottom: 8px; color: #00d2ff; }
        
        .input-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .input-row label { font-size: 0.95rem; }
        .input-row input { width: 100px; padding: 10px; border: 1px solid #444; border-radius: 8px; text-align: center; font-size: 1.1rem; background: #2c2c2c; color: #00d2ff; font-weight: bold; }

        .expense-form { display: flex; gap: 8px; margin-bottom: 15px; flex-wrap: wrap; }
        .expense-form input { flex: 2; min-width: 100px; padding: 12px; border: 1px solid #444; border-radius: 8px; background: #2c2c2c; color: white; }
        .expense-form select { flex: 1; padding: 12px; border-radius: 8px; background: #2c2c2c; color: white; border: 1px solid #444; }
        .btn-add { width: 100%; padding: 14px; background: #3a7bd5; color: white; border: none; border-radius: 10px; font-size: 1rem; font-weight: bold; }

        .expense-list { list-style: none; padding: 0; margin: 0; }
        .expense-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #333; }
        .tag { padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: bold; }
        .tag-survival { background: #1565c0; color: white; }
        .tag-ent-inv { background: #6a1b9a; color: white; }
        .btn-delete { background: #c62828; color: white; border: none; border-radius: 6px; padding: 6px 10px; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2 style="margin:0; color: #00d2ff;">DISCO SURVIVAL</h2>
        <select id="monthSelector" onchange="loadData()">
            <option value="2026-04">2026 四月</option>
            <option value="2026-05">2026 五月</option>
            <option value="2026-06">2026 六月</option>
        </select>
    </div>

    <div class="status-card">
        <div class="target-text">基本生存門檻：<span id="displayTarget">20,000</span></div>
        <div class="water-bar-container">
            <div id="waterBar" class="water-fill" style="width: 0%;">目前收入 $0</div>
        </div>
        <div class="survival-tracking">生存預算餘額：<span id="survivalBalance">20,000</span></div>
        <div id="statusResult" class="result-text danger">🚨 計算中...</div>
    </div>

    <div class="section">
        <h3>🎯 設定本月目標</h3>
        <div class="input-row">
            <label>每月預設門檻 ($)</label>
            <input type="number" id="baseSurvivalGoal" value="20000" onchange="saveData()">
        </div>
    </div>

    <div class="section">
        <h3>💰 收入紀錄</h3>
        <div class="input-row"><label>教課收入</label><input type="number" id="teaching" value="0" onchange="saveData()"></div>
        <div class="input-row"><label>已排硬體 (2750/場)</label><input type="number" id="gigs" value="0" onchange="saveData()"></div>
        <div class="input-row"><label>打工時數 (225/hr)</label><input type="number" id="ptHours" value="0" onchange="saveData()"></div>
        <div class="input-row"><label>Bass 收入</label><input type="number" id="bassIncome" value="0" onchange="saveData()"></div>
    </div>

    <div class="section">
        <h3>💸 每日花費記帳</h3>
        <div class="expense-form">
            <input type="text" id="expName" placeholder="項目">
            <input type="number" id="expAmount" placeholder="金額">
            <select id="expCategory">
                <option value="生存">生存</option>
                <option value="投資/娛樂">投資/娛樂</option>
            </select>
            <button class="btn-add" onclick="addExpense()">+ 記一筆</button>
        </div>
        <ul id="expenseList" class="expense-list"></ul>
    </div>
</div>

<script>
    function getStorageKey() { return 'brainApp_v7_' + document.getElementById('monthSelector').value; }

    function loadData() {
        const saved = localStorage.getItem(getStorageKey());
        let data = saved ? JSON.parse(saved) : { baseGoal: 20000, teaching: 0, gigs: 0, ptHours: 0, bassIncome: 0, expenses: [] };
        document.getElementById('baseSurvivalGoal').value = data.baseGoal || 20000;
        document.getElementById('teaching').value = data.teaching;
        document.getElementById('gigs').value = data.gigs;
        document.getElementById('ptHours').value = data.ptHours;
        document.getElementById('bassIncome').value = data.bassIncome;
        renderExpenses(data.expenses);
        calculateState(data);
    }

    function saveData() {
        const key = getStorageKey();
        let data = JSON.parse(localStorage.getItem(key)) || { expenses: [] };
        data.baseGoal = parseInt(document.getElementById('baseSurvivalGoal').value) || 0;
        data.teaching = parseInt(document.getElementById('teaching').value) || 0;
        data.gigs = parseInt(document.getElementById('gigs').value) || 0;
        data.ptHours = parseInt(document.getElementById('ptHours').value) || 0;
        data.bassIncome = parseInt(document.getElementById('bassIncome').value) || 0;
        localStorage.setItem(key, JSON.stringify(data));
        calculateState(data);
    }

    function addExpense() {
        const name = document.getElementById('expName').value.trim();
        const amount = parseInt(document.getElementById('expAmount').value);
        const category = document.getElementById('expCategory').value;
        if (!name || isNaN(amount)) return;
        let data = JSON.parse(localStorage.getItem(getStorageKey())) || { baseGoal: 20000, teaching: 0, gigs: 0, ptHours: 0, bassIncome: 0, expenses: [] };
        data.expenses.push({ id: Date.now(), name, amount, category });
        localStorage.setItem(getStorageKey(), JSON.stringify(data));
        document.getElementById('expName').value = ''; document.getElementById('expAmount').value = '';
        renderExpenses(data.expenses);
        calculateState(data);
    }

    function deleteExpense(id) {
        let data = JSON.parse(localStorage.getItem(getStorageKey()));
        data.expenses = data.expenses.filter(exp => exp.id !== id);
        localStorage.setItem(getStorageKey(), JSON.stringify(data));
        renderExpenses(data.expenses);
        calculateState(data);
    }

    function renderExpenses(expenses) {
        const list = document.getElementById('expenseList'); list.innerHTML = '';
        expenses.forEach(exp => {
            const li = document.createElement('li'); li.className = 'expense-item';
            li.innerHTML = `<div><span class="tag ${exp.category==='生存'?'tag-survival':'tag-ent-inv'}">${exp.category}</span>
                <span style="margin-left:8px;">${exp.name}</span></div>
                <div><span style="margin-right:10px;">$${exp.amount}</span><button class="btn-delete" onclick="deleteExpense(${exp.id})">刪除</button></div>`;
            list.appendChild(li);
        });
    }

    function calculateState(data) {
        const income = data.teaching + (data.gigs * 2750) + (data.ptHours * 225) + data.bassIncome;
        let survivalSpend = 0, investSpend = 0;
        data.expenses.forEach(exp => {
            if (exp.category === '生存') survivalSpend += exp.amount;
            else investSpend += exp.amount;
        });

        // 核心邏輯修正：
        // 1. 生存餘額還是顯示給你看，讓你知道吃飯花多少，但它不直接決定「紅燈」
        let survivalBal = data.baseGoal - survivalSpend;
        
        // 2. 達標判斷：總收入 必須大於 (設定的門檻 + 所有的投資娛樂花費)
        // 且 如果生存超支(survivalBal < 0)，超支的部分也會算入目標，因為你得賺回來補。
        let overSpend = survivalBal < 0 ? Math.abs(survivalBal) : 0;
        let finalRequired = data.baseGoal + investSpend + overSpend;
        let freeCash = income - (survivalSpend + investSpend);

        document.getElementById('displayTarget').innerText = data.baseGoal.toLocaleString();
        document.getElementById('survivalBalance').innerText = survivalBal.toLocaleString();
        document.getElementById('survivalBalance').style.color = survivalBal < 0 ? '#ff5252' : '#81c784';

        let bar = document.getElementById('waterBar');
        let perc = Math.min(100, (income / finalRequired) * 100) || 0;
        bar.style.width = perc + '%';
        bar.innerText = `目前收入 $${income.toLocaleString()}`;

        let res = document.getElementById('statusResult');
        if (income >= finalRequired) {
            res.className = 'result-text success';
            res.innerText = `🎉 順利活下來了！\n投資/娛樂可用：+${freeCash.toLocaleString()} 元`;
        } else {
            let gap = finalRequired - income;
            res.className = 'result-text danger';
            res.innerText = `🚧 尚未達標。距離存活與慾望補完還差 ${gap.toLocaleString()} 元。`;
        }
    }
    loadData();
</script>
</body>
</html>
